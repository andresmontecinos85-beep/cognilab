<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 30px 34px; background: var(--cream); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 20px 22px; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Field, Input, Textarea, Select } = window.CogniLabDesignSystem_b6f223;
    function Demo(){
      return (
        <div className="grid">
          <Field label="Nombre" htmlFor="n" required><Input id="n" placeholder="Tu nombre" /></Field>
          <Field label="Teléfono" htmlFor="t" required><Input id="t" placeholder="+56 9 ..." /></Field>
          <Field label="Servicio de interés" htmlFor="s"><Select id="s"><option>Fonoaudiología</option><option>Terapia Ocupacional</option><option>Psicología</option></Select></Field>
          <Field label="Correo" htmlFor="e" error="Ingresa un correo válido"><Input id="e" defaultValue="hola@" /></Field>
          <div style={{gridColumn:'1 / -1'}}>
            <Field label="Mensaje" htmlFor="m" hint="Cuéntanos brevemente cómo podemos ayudar"><Textarea id="m" rows={3} placeholder="Escribe aquí..." /></Field>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>
