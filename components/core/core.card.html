<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 30px 34px; background: var(--cream); }
  .demo { display:flex; flex-direction:column; gap: 22px; }
  .grp { display:flex; flex-wrap:wrap; gap: 14px; align-items:center; }
  .cap { font: 600 11px var(--font-brand); letter-spacing:.12em; text-transform:uppercase; color: var(--text-subtle); margin-bottom: 10px; }
  .lucide { width:1.15em; height:1.15em; }
</style></head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Tag, Badge, Card } = window.CogniLabDesignSystem_b6f223;
    const Ico = ({n}) => <i data-lucide={n} className="lucide"></i>;
    function Demo(){
      return (
        <div className="demo">
          <div>
            <div className="cap">Buttons</div>
            <div className="grp">
              <Button variant="primary" trailingIcon={<Ico n="arrow-right"/>}>Agenda tu hora</Button>
              <Button variant="accent">Conversemos</Button>
              <Button variant="secondary">Conocer más</Button>
              <Button variant="ghost" trailingIcon={<Ico n="chevron-right"/>}>Ver servicios</Button>
              <Button variant="whatsapp" leadingIcon={<Ico n="message-circle"/>}>WhatsApp</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div className="grp" style={{alignItems:'center'}}>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg">Large</Button>
          </div>
          <div>
            <div className="cap">Tags &amp; badges</div>
            <div className="grp">
              <Tag tone="primary">Fonoaudiología</Tag>
              <Tag tone="accent" dot>Terapia Ocupacional</Tag>
              <Tag tone="amber">Psicología</Tag>
              <Tag tone="neutral">A domicilio</Tag>
              <Tag tone="outline">Jardines y colegios</Tag>
              <Badge>3</Badge>
              <Badge soft>Nuevo</Badge>
            </div>
          </div>
          <div className="grp" style={{alignItems:'stretch'}}>
            <Card style={{flex:1}}><strong style={{font:'var(--h4)',fontFamily:'var(--font-display)'}}>Paper</strong><p style={{font:'var(--body-sm)',color:'var(--text-muted)',marginTop:8}}>Superficie por defecto.</p></Card>
            <Card variant="tint" interactive style={{flex:1}}><strong style={{font:'var(--h4)',fontFamily:'var(--font-display)'}}>Tint · hover</strong><p style={{font:'var(--body-sm)',color:'var(--text-muted)',marginTop:8}}>Pásale el cursor.</p></Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    requestAnimationFrame(()=> window.lucide && window.lucide.createIcons());
    setTimeout(()=> window.lucide && window.lucide.createIcons(), 300);
  </script>
</body></html>
