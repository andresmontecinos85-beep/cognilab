<script type="text/babel">
const { useState, useEffect } = React;
const WA = "https://wa.me/56997896798";

function WAIcon({ size=22 }) {

function Logo({ height=62, white=false }) {
  return <svg viewBox="0 0 6119.12 1830.7" style={{height, width:'auto', filter:white?'brightness(0) invert(1)':'none'}} aria-label="CogniLab" dangerouslySetInnerHTML={{__html: window.SVG_INNER}} />;
}
function Mark({ size=56 }) {
  return <svg viewBox="357 2 1131 1131" style={{height:size, width:size}} aria-hidden="true" dangerouslySetInnerHTML={{__html: window.SVG_INNER}} />;
}

const NAVLINKS = [{href:'#servicios',label:'Servicios'},{href:'#especialidades',label:'Especialidades'},{href:'#cognilab',label:'Sobre CogniLab'},{href:'#catalina',label:'Catalina'},{href:'#contacto',label:'Contacto'}];

function Header() {
  const [stuck, setStuck] = useState(false);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const fn = () => setStuck(window.scrollY > 12);
    window.addEventListener('scroll', fn, {passive:true});
    return () => window.removeEventListener('scroll', fn);
  }, []);
  useEffect(() => { window.lucide?.createIcons(); }, [open]);
  const close = () => setOpen(false);
  return (
    <header className={'hdr'+(stuck?' stuck':'')}>
      <div className="wrap hdr__in">
        <a className="brand" href="#inicio"><Logo height={62} /></a>
        <nav className="nav">{NAVLINKS.map(n=><a key={n.href} href={n.href}>{n.label}</a>)}</nav>
        <div className="hdr__cta">
          <a className="cl-btn cl-btn--wa cl-btn--sm wa" href={WA} target="_blank" rel="noopener"><WAIcon size={18}/> Agenda por WhatsApp</a>
          <button className="burger" aria-label="Menú" onClick={()=>setOpen(o=>!o)}><i data-lucide={open?'x':'menu'}></i></button>
        </div>
      </div>
      <div className={'mnav'+(open?' open':'')}>
        {NAVLINKS.map(n=><a key={n.href} href={n.href} onClick={close}>{n.label}</a>)}
        <a className="cl-btn cl-btn--wa" href={WA} target="_blank" rel="noopener" onClick={close}><WAIcon size={18}/> Agenda por WhatsApp</a>
      </div>
    </header>
  );
}

function Hero() {
  return (
    <section className="hero" id="inicio">
      <div className="wrap hero__grid">
        <div className="reveal in">
          <span className="eyebrow">Espacio Terapéutico · Basado en evidencia</span>
          <h1 className="hero__h" style={{marginTop:'var(--space-4)'}}>Acompañamos el <em>desarrollo</em> de quienes más amas</h1>
          <p className="hero__lead">Fonoaudiología, terapia ocupacional y psicología integrados en un mismo lugar. Una mirada cálida, cercana y profesional para cada familia.</p>
          <div className="hero__act">
            <a className="cl-btn cl-btn--primary cl-btn--lg" href="#contacto">Agenda tu hora <i data-lucide="arrow-right" style={{display:'inline-block',width:'1.1em',height:'1.1em',verticalAlign:'middle'}}></i></a>
            <a className="cl-btn cl-btn--secondary cl-btn--lg" href="#servicios">Conocer servicios</a>
          </div>
          <div className="hero__trust">
            {[['14+','Años de experiencia'],['3','Disciplinas integradas'],['3','Modalidades de atención']].map(([n,l])=>(
              <div key={l}><div className="stat__n" dangerouslySetInnerHTML={{__html:n.replace('+','<em>+</em>')}}/><div className="stat__l">{l}</div></div>
            ))}
          </div>
        </div>
        <div className="hero__media reveal in">
          <div className="hero__blob"/>
          <div className="hero__photo"><img src={window.IMGS.consulta} alt="Sala de terapia CogniLab"/></div>
          <div className="hero__deco"><Mark size={80}/></div>
          <div className="hero__badge"><Mark size={44}/><div><div style={{font:'var(--fw-semibold) var(--text-sm) var(--font-body)',color:'var(--ink-900)'}}>Atención cercana</div><div style={{font:'var(--body-sm)',color:'var(--text-muted)'}}>En consulta · a domicilio</div></div></div>
        </div>
      </div>
    </section>
  );
}

function Modalidades() {
  const ms=[{ic:'building-2',t:'En consulta',d:'Av. Consistorial 5791, Of. 55, Peñalolén.'},{ic:'house',t:'A domicilio',d:'Terapia en la comodidad de tu hogar.'},{ic:'school',t:'Jardines y colegios',d:'Programas de detección preventiva in situ.'}];
  return <section className="sec" style={{paddingTop:0}}><div className="wrap"><div className="modals">{ms.map((m,i)=><div className="modal reveal" key={i}><span className="modal__ic"><i data-lucide={m.ic}></i></span><div><h4>{m.t}</h4><p>{m.d}</p></div></div>)}</div></div></section>;
}

function Servicios() {
  const ss=[{c:'',ic:'speech',t:'Fonoaudiología',d:'Evaluación y tratamiento del habla, el lenguaje, la comunicación y la motricidad orofacial.'},{c:'accent',ic:'puzzle',t:'Terapia Ocupacional',d:'Autonomía, juego, integración sensorial y habilidades para la vida diaria.'},{c:'amber',ic:'heart-handshake',t:'Psicología',d:'Bienestar emocional y acompañamiento para niños, jóvenes y sus familias.'}];
  return (
    <section className="sec sec--alt" id="servicios">
      <div className="wrap">
        <div className="ch reveal"><span className="eyebrow">Nuestros servicios</span><h2 style={{font:'var(--h2)',marginTop:'var(--space-3)'}}>Tres especialidades, un mismo equipo</h2><p style={{font:'var(--lead)',color:'var(--text-soft)',marginTop:'var(--space-3)'}}>Trabajamos de forma integrada para mirar a cada persona de manera completa, no por partes.</p></div>
        <div className="g3">{ss.map((s,i)=><div className={'svc reveal'+(s.c?' svc--'+s.c:'')} key={i} style={{transitionDelay:i*80+'ms'}}><span className="svc__ic"><i data-lucide={s.ic}></i></span><h3 style={{font:'var(--fw-semibold) var(--text-2xl)/1.2 var(--font-display)'}}>{s.t}</h3><div style={{font:'var(--body)',color:'var(--text-muted)'}}>{s.d}</div><div style={{marginTop:'auto'}}><a className="cl-btn cl-btn--ghost" href="#contacto">Conversemos</a></div></div>)}</div>
      </div>
    </section>
  );
}

function Especialidades() {
  const as=[{ic:'audio-lines',t:'Trastornos del Habla',d:'Evaluación y tratamiento de los sonidos del habla y la articulación.'},{ic:'baby',t:'Estimulación Temprana',d:'Intervención desde los primeros meses de vida.'},{ic:'messages-square',t:'Lenguaje y Comunicación',d:'Desarrollo comprensivo y expresivo del lenguaje.'},{ic:'utensils',t:'Motricidad Orofacial',d:'Alimentación, deglución y respiración.'},{ic:'shapes',t:'TEA y Comunicación Aumentativa',d:'Apoyo a niños con autismo mediante herramientas alternativas al habla.'},{ic:'mic',t:'Apraxia y Hablantes Tardíos',d:'Acompañamos a destrabar el habla.'}];
  return (
    <section className="sec" id="especialidades">
      <div className="wrap">
        <div className="reveal" style={{marginBottom:'var(--space-7)',maxWidth:'60ch'}}><span className="eyebrow">Áreas de especialización · Infanto-juvenil</span><h2 style={{font:'var(--h2)',marginTop:'var(--space-3)'}}>Desarrollo comunicativo, paso a paso</h2><p style={{font:'var(--lead)',color:'var(--text-soft)',marginTop:'var(--space-3)'}}>Cada plan se diseña a la medida, con objetivos claros y acompañamiento a la familia.</p></div>
        <div className="g2">{as.map((a,i)=><div className="area reveal" key={i}><span className="area__ic"><i data-lucide={a.ic}></i></span><div><h4>{a.t}</h4><p>{a.d}</p></div></div>)}</div>
      </div>
    </section>
  );
}

function SobreCogniLab() {
  const vs=[{ic:'microscope',t:'Basado en evidencia',d:'Decisiones clínicas respaldadas por la mejor evidencia.'},{ic:'puzzle',t:'Mirada integral',d:'Tres disciplinas que conversan entre sí.'},{ic:'heart',t:'Cercanía real',d:'Tiempo, calma y trato humano en cada sesión.'},{ic:'users',t:'Junto a la familia',d:'Herramientas para continuar en casa.'}];
  return (
    <section className="sec sec--deep" id="cognilab">
      <div className="wrap">
        <div className="g2" style={{alignItems:'start',gap:'clamp(2rem,5vw,4.5rem)'}}>
          <div className="reveal"><span className="eyebrow">Sobre CogniLab</span><h2 style={{font:'var(--h2)',marginTop:'var(--space-3)'}}>Un espacio pensado para las familias</h2><p style={{font:'var(--lead)',color:'var(--text-soft)',marginTop:'var(--space-4)'}}>CogniLab nace para reunir, en un solo lugar, la terapia que tu familia necesita. Atención profesional y rigurosa, sin perder la calidez.</p><p style={{font:'var(--body)',color:'var(--text-muted)',marginTop:'var(--space-4)',maxWidth:'52ch'}}>Más que tratar un diagnóstico, acompañamos un camino.</p></div>
          <div className="g2 reveal" style={{gap:'var(--space-4)'}}>{vs.map((v,i)=><div className="cl-card" key={i} style={{padding:'var(--space-5)'}}><span className="svc__ic" style={{width:46,height:46,marginBottom:'var(--space-3)'}}><i data-lucide={v.ic} style={{width:22,height:22}}></i></span><h4 style={{marginBottom:4}}>{v.t}</h4><p style={{font:'var(--body-sm)',color:'var(--text-muted)'}}>{v.d}</p></div>)}</div>
        </div>
      </div>
    </section>

}

function Catalina() {

function Faq() {
  const [open, setOpen] = useState(0);
  const qs=[{q:'¿Atienden a domicilio?',a:'Sí. Llegamos a la comodidad de tu hogar para que la terapia ocurra en un entorno seguro.'},{q:'¿Desde qué edad evalúan?',a:'Desde los primeros meses de vida. Nunca es demasiado pronto.'},{q:'¿Trabajan con jardines y colegios?',a:'Contamos con programas de detección preventiva in situ.'},{q:'¿Necesito derivación médica?',a:'No es indispensable. Puedes escribirnos directamente.'}];
  return (
    <section className="sec" id="faq"><div className="wrap wrap--sm">

      <div className="reveal">{qs.map((f,i)=>{const isOpen=open===i;return(<div className="acc__item" data-open={isOpen} key={i}><button className="acc__trigger" onClick={()=>setOpen(isOpen?-1:i)}><span>{f.q}</span><span className="acc__icon">+</span></button><div className="acc__panel"><div><div className="acc__body">{f.a}</div></div></div></div>);})}</div>

function Contacto() {

      <div className="contact">
        <div className="reveal">
          {[{ic:'message-circle',l:'WhatsApp',v:<a href={WA} target="_blank" rel="noopener">+56 9 9789 6798</a>},{ic:'mail',l:'Correo',v:<a href="mailto:facatalina.bobadilla@gmail.com">facatalina.bobadilla@gmail.com</a>},{ic:'map-pin',l:'Consulta',v:<span>Av. Consistorial 5791, Of. 55, Peñalolén</span>},{ic:'clock',l:'Horario',v:<span>Lunes a viernes · agenda flexible</span>}].map((c,i)=>(

            <div className="socials"><a className="social" href="#" aria-label="Instagram"><i data-lucide="instagram"></i></a><a className="social" href="#" aria-label="Facebook"><i data-lucide="facebook"></i></a><a className="social" href={WA} target="_blank" rel="noopener" aria-label="WhatsApp"><WAIcon size={21}/></a></div>
          </div>
        </div>
        <div className="fcard reveal">
          {sent ? (
            <div style={{textAlign:'center',padding:'var(--space-6) 0'}}>
              <span className="svc__ic" style={{margin:'0 auto var(--space-4)',background:'var(--success-100)',color:'var(--success-600)'}}><i data-lucide="check"></i></span>
              <h3 style={{font:'var(--h3)',color:'var(--ink-900)'}}>¡Gracias por escribirnos!</h3>

              <a className="cl-btn cl-btn--wa" href={WA} target="_blank" rel="noopener" style={{marginTop:'var(--space-5)'}}><WAIcon size={18}/> Abrir WhatsApp</a>
            </div>
          ) : (
            <form onSubmit={e=>{e.preventDefault();setSent(true);}}>
              <div className="frow"><div className="cl-field"><label className="cl-label" htmlFor="cn">Nombre<span className="req">*</span></label><input className="cl-input" id="cn" required placeholder="Tu nombre"/></div><div className="cl-field"><label className="cl-label" htmlFor="ct">Teléfono<span className="req">*</span></label><input className="cl-input" id="ct" required placeholder="+56 9 ..."/></div></div>
              <div className="cl-field" style={{marginTop:'var(--space-4)'}}><label className="cl-label" htmlFor="cs">Servicio de interés</label><select className="cl-select" id="cs"><option>Fonoaudiología</option><option>Terapia Ocupacional</option><option>Psicología</option><option>No estoy seguro/a</option></select></div>
              <div className="cl-field" style={{marginTop:'var(--space-4)'}}><label className="cl-label" htmlFor="cm">Mensaje</label><textarea className="cl-textarea" id="cm" rows="4" placeholder="Cuéntanos cómo podemos ayudar"></textarea></div>
              <button className="cl-btn cl-btn--primary cl-btn--block cl-btn--lg" type="submit" style={{marginTop:'var(--space-5)'}}>Enviar mensaje</button>
              <p style={{font:'var(--body-sm)',color:'var(--text-subtle)',textAlign:'center',marginTop:'var(--space-3)'}}>Te responderemos en horario hábil.</p>

      </div>
    </div></section>
  );
}

function Footer() {
  return (
    <footer className="ftr"><div className="wrap">
      <div className="ftr__top">
        <div><Logo height={52} white={true}/><p>Espacio terapéutico para el desarrollo comunicativo, basado en evidencia y centrado en cada familia.</p></div>

    </div></footer>
  );
}

function App() {
  useEffect(() => {
    document.documentElement.classList.add('js');
    window.lucide?.createIcons();
    const io = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);} }), {threshold:0.08});
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return <><Header/><main><Hero/><Modalidades/><Servicios/><Especialidades/><SobreCogniLab/><Catalina/><Faq/><Contacto/></main><Footer/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(() => window.lucide?.createIcons(), 800);
</script>
</body>
