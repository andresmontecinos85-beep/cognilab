.social svg{width:21px;height:21px}
.form-card{background:var(--paper);border:1px solid var(--border-soft);border-radius:var(--radius-xl);box-shadow:var(--shadow-card);padding:clamp(1.5rem,3vw,2.5rem)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)}
.ftr{background:var(--teal-900);color:#fff;padding-block:var(--space-8) var(--space-6)}
.ftr a{color:var(--teal-100)}
.ftr a:hover{color:#fff}
.ftr__top{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:var(--space-7);padding-bottom:var(--space-7);border-bottom:1px solid color-mix(in srgb,#fff 16%,transparent)}
.ftr__wm{font-family:var(--font-brand);font-weight:700;font-size:26px;color:#fff}
.ftr__wm b{color:var(--amber-400)}
.ftr p{font:var(--body-sm);color:var(--teal-200);max-width:34ch;margin-top:var(--space-3)}
.ftr h5{font:var(--fw-bold) var(--text-xs) var(--font-brand);letter-spacing:.14em;text-transform:uppercase;color:var(--teal-300);margin-bottom:var(--space-4)}
.ftr ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:var(--space-3);font:var(--body-sm)}
.ftr__bottom{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding-top:var(--space-5);font:var(--body-sm);color:var(--teal-200);flex-wrap:wrap}
.ftr__bottom .socials .social{background:color-mix(in srgb,#fff 10%,transparent);border-color:color-mix(in srgb,#fff 18%,transparent);color:#fff}
.ftr__bottom .socials .social:hover{background:#fff;color:var(--teal-900)}
@media(max-width:1040px){.nav,.hdr__cta .cl-btn{display:none}.hdr__burger{display:block}}
@media(max-width:980px){.hero__grid{grid-template-columns:1fr}.hero__media{order:-1;max-width:440px}.founder{grid-template-columns:1fr}.founder__photo{max-width:380px}.contact{grid-template-columns:1fr}.grid-3,.modals{grid-template-columns:1fr 1fr}.ftr__top{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.grid-3,.grid-2,.modals,.form-row{grid-template-columns:1fr}.ftr__top{grid-template-columns:1fr}.hero__badge{left:8px}.hero__trust{gap:var(--space-5)}}
</style>

function App() {
  useEffect(() => {
    document.documentElement.classList.add('js');
    if (window.lucide) window.lucide.createIcons();
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); } });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (
    <>
      <Header />
      <main>
        <Hero />
        <Modalidades />
        <Servicios />
        <Especialidades />
        <SobreCogniLab />
        <Catalina />
        <Faq />
        <Contacto />
      </main>
      <Footer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 600);
</script>
