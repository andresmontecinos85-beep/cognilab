<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 30px 36px; background: var(--paper); display:flex; flex-direction:column; gap: 22px; }
  .wordmark { font-family: var(--font-brand); font-weight: 700; font-size: 56px; letter-spacing: -0.01em; color: var(--ink-900); }
  .wordmark b { color: var(--coral-500); font-weight: 700; }
  .eyebrows { display:flex; gap: 28px; align-items:center; flex-wrap: wrap; }
  .tag { font: var(--body-sm); color: var(--text-subtle); }
</style></head>
<body>
  <div class="wordmark">cogni<b>lab</b></div>
  <div class="eyebrows">
    <span class="cl-eyebrow">Espacio Terapéutico</span>
    <span class="cl-eyebrow" style="color:var(--accent)">Basado en Evidencia</span>
    <span class="cl-eyebrow" style="color:var(--ink-400)">Fonoaudiología</span>
  </div>
  <div class="tag">Quicksand 700 for the wordmark · uppercase 0.16em tracking for eyebrows/labels</div>
</body></html>
