<!-- @dsCard group="Spacing" viewport="700x190" name="Corner radii" subtitle="Soft, friendly rounding" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 30px; background: var(--paper); }
  .grid { display:flex; gap:18px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width: 84px; height: 84px; background: var(--teal-100); border: 1.5px solid var(--teal-400); }
  .cap { margin-top:8px; font: var(--body-sm); color:var(--text-muted); }
  .cap b { display:block; color: var(--ink-900); font-weight:600; }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="cap"><b>sm</b>10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="cap"><b>md</b>16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="cap"><b>lg · card</b>24px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="cap"><b>xl</b>32px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="cap"><b>2xl</b>44px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="cap"><b>pill</b>999</div></div>
  </div>
</body></html>
