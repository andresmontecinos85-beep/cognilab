<!-- @dsCard group="Type" viewport="700x300" name="Display · Newsreader" subtitle="Soft editorial serif for hero & display" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 32px 36px; background: var(--paper); }
  .row { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--border-soft); padding: 14px 0; }
  .row:last-child { border-bottom: 0; }
  .meta { font: var(--body-sm); color: var(--text-subtle); width: 86px; flex: none; }
  .spec { font-family: var(--font-display); color: var(--ink-900); line-height: var(--lh-tight); letter-spacing: var(--ls-tight); }
</style></head>
<body>
  <div class="row"><span class="meta">5xl · 76</span><span class="spec" style="font-size:var(--text-5xl);font-weight:500">Cuidar con evidencia</span></div>
  <div class="row"><span class="meta">4xl · 60</span><span class="spec" style="font-size:var(--text-4xl);font-weight:500">Acompañamos a cada familia</span></div>
  <div class="row"><span class="meta">3xl · 46</span><span class="spec" style="font-size:var(--text-3xl);font-weight:400;font-style:italic">Terapia cercana y profesional</span></div>
</body></html>
