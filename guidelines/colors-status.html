<!-- @dsCard group="Colors" viewport="700x150" name="Status · gentle & clinical" subtitle="Success, info, warning, error" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 30px; background: var(--paper); }
  .grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .pill { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius: var(--radius-md); font: 600 14px var(--font-body); }
  .dot { width:14px; height:14px; border-radius:50%; flex:none; }
</style></head>
<body>
  <div class="grid">
    <div class="pill" style="background:var(--success-100);color:var(--success-600)"><span class="dot" style="background:var(--success-600)"></span>Success</div>
    <div class="pill" style="background:var(--info-100);color:var(--info-600)"><span class="dot" style="background:var(--info-600)"></span>Info</div>
    <div class="pill" style="background:var(--warning-100);color:var(--warning-600)"><span class="dot" style="background:var(--warning-600)"></span>Warning</div>
    <div class="pill" style="background:var(--error-100);color:var(--error-600)"><span class="dot" style="background:var(--error-600)"></span>Error</div>
  </div>
</body></html>
