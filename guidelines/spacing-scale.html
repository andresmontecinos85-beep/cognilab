<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale · 8pt" subtitle="Generous, airy rhythm" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 30px; background: var(--paper); display:flex; flex-direction:column; gap:9px; }
  .row { display:flex; align-items:center; gap:14px; }
  .bar { height: 16px; background: var(--teal-300); border-radius: 4px; }
  .lbl { font: var(--body-sm); color: var(--text-muted); width: 120px; flex:none; }
  .lbl b { color: var(--ink-900); font-weight:600; }
</style></head>
<body>
  <div class="row"><span class="lbl"><b>2</b> · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl"><b>3</b> · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl"><b>4</b> · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl"><b>5</b> · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl"><b>6</b> · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl"><b>7</b> · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="lbl"><b>8</b> · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="lbl"><b>9</b> · 96px</span><div class="bar" style="width:96px"></div></div>
</body></html>
