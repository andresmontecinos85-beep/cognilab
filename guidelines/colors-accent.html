<!-- @dsCard group="Colors" viewport="700x250" name="Accent & warm · Coral / Amber" subtitle="Warmth and energy, used sparingly" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 30px; background: var(--paper); display:flex; flex-direction:column; gap:18px; }
  .grp h4 { font: 600 12px var(--font-brand); letter-spacing:.08em; text-transform:uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 60px; display:flex; align-items:flex-end; padding:6px; }
  .sw span { font: 600 11px var(--font-body); }
</style></head>
<body>
  <div class="grp">
    <h4>Coral — accent</h4>
    <div class="scale">
      <div class="sw" style="background:var(--coral-100)"></div>
      <div class="sw" style="background:var(--coral-200)"></div>
      <div class="sw" style="background:var(--coral-300)"></div>
      <div class="sw" style="background:var(--coral-400);color:#fff"></div>
      <div class="sw" style="background:var(--coral-500);color:#fff"><span>500</span></div>
      <div class="sw" style="background:var(--coral-600);color:#fff"></div>
      <div class="sw" style="background:var(--coral-700);color:#fff"></div>
    </div>
  </div>
  <div class="grp">
    <h4>Amber — highlight</h4>
    <div class="scale">
      <div class="sw" style="background:var(--amber-100)"></div>
      <div class="sw" style="background:var(--amber-200)"></div>
      <div class="sw" style="background:var(--amber-400)"></div>
      <div class="sw" style="background:var(--amber-500);color:#fff"><span>500</span></div>
      <div class="sw" style="background:var(--amber-600);color:#fff"></div>
      <div class="sw" style="background:var(--amber-600);color:#fff"></div>
      <div class="sw" style="background:var(--amber-600);color:#fff"></div>
    </div>
  </div>
</body></html>
