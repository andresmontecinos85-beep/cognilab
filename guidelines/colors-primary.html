<!-- @dsCard group="Colors" viewport="700x190" name="Primary · Turquoise" subtitle="The calm, clinical lead color" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 26px 30px; background: var(--paper); }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 76px; display: flex; align-items: flex-end; padding: 7px; }
  .sw span { font: 600 11px var(--font-body); }
  .labels { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0; margin-top: 8px; }
  .labels span { font: var(--body-sm); color: var(--text-muted); text-align: center; font-size: 11px; }
</style></head>
<body>
  <div class="scale">
    <div class="sw" style="background:var(--teal-50)"></div>
    <div class="sw" style="background:var(--teal-100)"></div>
    <div class="sw" style="background:var(--teal-200)"></div>
    <div class="sw" style="background:var(--teal-300)"></div>
    <div class="sw" style="background:var(--teal-400)"></div>
    <div class="sw" style="background:var(--teal-500);color:#fff"><span>500</span></div>
    <div class="sw" style="background:var(--teal-600);color:#fff"></div>
    <div class="sw" style="background:var(--teal-700);color:#fff"><span>700</span></div>
    <div class="sw" style="background:var(--teal-800);color:#fff"></div>
    <div class="sw" style="background:var(--teal-900);color:#fff"></div>
  </div>
  <div class="labels">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span>
  </div>
</body></html>
