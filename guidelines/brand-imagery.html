<!-- @dsCard group="Brand" viewport="700x250" name="Imagery direction" subtitle="Warm, natural light · real moments of care" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; background: var(--paper); }
  .row { display:grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 16px; align-items:stretch; }
  figure { margin:0; border-radius: var(--radius-lg); overflow:hidden; box-shadow: var(--shadow-card); position:relative; }
  figure img { width:100%; height: 178px; object-fit: cover; }
  .note { padding: 4px; }
  .note h4 { font: var(--h4); font-family: var(--font-display); font-weight:600; font-size: 18px; color: var(--ink-900); margin-bottom:6px; }
  .note p { font: var(--body-sm); color: var(--text-muted); line-height:1.5; }
  .note ul { margin: 8px 0 0; padding-left: 16px; font: var(--body-sm); color: var(--text-muted); line-height: 1.7; }
</style></head>
<body>
  <div class="row">
    <figure><img src="../assets/photo-catalina.png" alt="Retrato cálido"></figure>
    <figure><img src="../assets/photo-consulta.png" alt="Espacio de consulta"></figure>
    <div class="note">
      <h4>Cálida y natural</h4>
      <p>Personas reales, luz suave de día, gestos cercanos. Nunca clínica fría ni stock genérico.</p>
      <ul>
        <li>Tonos tibios, sin filtros saturados</li>
        <li>Encuadres con aire y profundidad</li>
        <li>Esquinas redondeadas (lg · 24px)</li>
      </ul>
    </div>
  </div>
</body></html>
